name: Security & Quality

on:
  schedule:
    # 每周一凌晨 3:00 UTC 运行
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --format=json . || true

  pre-commit-check:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import check (no circular imports)
        run: |
          python -c "from voicecalendar.config import WindowConfig, AnimationConfig, ToastConfig, AudioConfig"
          python -c "from voicecalendar.models.event import CalendarEvent, EventRecurrence, ParseIntent"
          python -c "from voicecalendar.core.theme import ThemeManager, ThemeMode"
          python -c "from voicecalendar.core.resources import ResourceLoader"
          python -c "from voicecalendar.services.errors import get_user_message, ASRError, NLUErrors, NetworkError"
          python -c "from voicecalendar.services.nlu_parser import NLUParser, QuickTimeParser"

      - name: Verify project structure
        run: |
          python -c "
          from pathlib import Path
          root = Path('.')

          # 检查必要文件
          required = [
              'pyproject.toml',
              'voicecalendar/__init__.py',
              'voicecalendar/main.py',
              'voicecalendar/config.py',
              'voicecalendar/core/__init__.py',
              'voicecalendar/ui/__init__.py',
              'voicecalendar/ui/main_window.py',
              'voicecalendar/ui/titlebar.py',
              'voicecalendar/services/__init__.py',
              'voicecalendar/services/nlu_parser.py',
              'voicecalendar/services/asr_dashscope.py',
              'voicecalendar/models/__init__.py',
              'voicecalendar/models/event.py',
              'tests/test_config.py',
              'tests/test_models.py',
              'tests/test_errors.py',
          ]
          missing = [f for f in required if not (root / f).exists()]
          if missing:
              print(f'Missing files: {missing}')
              exit(1)
          print(f'All {len(required)} required files present')
          "
